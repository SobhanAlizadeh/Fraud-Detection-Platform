# .streamlit/secrets.toml

# API Settings
API_URL = "http://api:8000"  # داخل Docker
# API_URL = "http://localhost:8000"  # برای اجرای محلی

# Database (اختیاری - اگر از دیتابیس در داشبورد استفاده می‌کنید)
[database]
host = "postgres"
port = 5432
database = "fraud_db"
user = "fraud_user"
password = "fraud_pass"

# Kafka (اختیاری)
[kafka]
bootstrap_servers = "kafka:9092"

# MLflow (اختیاری)
[mlflow]
tracking_uri = "http://mlflow:5000"